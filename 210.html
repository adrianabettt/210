
<style>
@import url('https://fonts.googleapis.com/css2?family=Fredoka+One&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:Arial,sans-serif;background:#1a0533;padding:16px;text-transform:uppercase;min-height:100vh}
.topo{text-align:center;padding:20px 8px 12px}
.topo h1{font-family:'Fredoka One',cursive;font-size:clamp(24px,6vw,40px);color:#EEEDFE;line-height:1.1}
.topo p{font-size:12px;color:#AFA9EC;margin-top:6px;font-weight:700}
.placar-bar{display:flex;justify-content:center;gap:12px;margin:12px 0 18px;flex-wrap:wrap}
.placar-item{background:#26215C;border-radius:12px;padding:8px 20px;text-align:center}
.placar-item span{font-family:'Fredoka One',cursive;font-size:24px;color:#EEEDFE;display:block}
.placar-item small{font-size:10px;color:#7F77DD;font-weight:700}
.fase-badge{text-align:center;margin-bottom:12px}
.fase-badge span{background:#534AB7;color:#EEEDFE;font-size:12px;font-weight:700;padding:4px 18px;border-radius:20px;letter-spacing:1px}
.card-jogo{background:#FFFFCC;border-radius:20px;padding:22px;margin-bottom:14px;border:2px solid #534AB7;max-width:560px;margin-left:auto;margin-right:auto}
.instrucao{background:#3C3489;border-radius:12px;padding:14px 16px;font-size:13px;font-weight:700;color:#CECBF6;margin-bottom:16px;text-align:center;line-height:1.6}
.instrucao .destaque{font-family:'Fredoka One',cursive;font-size:17px;color:#EEEDFE;display:block;margin-top:6px;word-break:break-word}
.pergunta{background:#412402;border:1.5px solid #BA7517;border-radius:12px;padding:12px 16px;font-size:13px;font-weight:700;color:#FAEEDA;margin-bottom:14px;text-align:center}
.opcoes-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:14px}
.op-n{background:#3C3489;border:2px solid #534AB7;border-radius:12px;padding:14px 4px;font-family:'Fredoka One',cursive;font-size:28px;color:#EEEDFE;cursor:pointer;text-align:center;transition:background .15s,border-color .15s,transform .1s;width:100%}
.op-n:hover{background:#534AB7;border-color:#AFA9EC;transform:scale(1.07)}
.op-n.certa{background:#0F6E56;border-color:#5DCAA5;color:#E1F5EE}
.op-n.errada{background:#A32D2D;border-color:#F09595;color:#FCEBEB;animation:shake .3s ease}
.op-n:disabled{cursor:not-allowed}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-7px)}75%{transform:translateX(7px)}}
.feedback{text-align:center;font-family:'Fredoka One',cursive;font-size:19px;min-height:28px;margin-bottom:12px}
.feedback.ok{color:#5DCAA5}
.feedback.nao{color:#F09595}

/* área animação — aparece só depois de responder */
.anim-area{background:#1a0533;border-radius:14px;padding:18px;min-height:100px;display:flex;flex-direction:column;align-items:center;justify-content:center;margin-bottom:14px;border:1.5px solid #534AB7}
.anim-icones{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin-bottom:10px}
.anim-ico{font-size:34px;opacity:0;transform:scale(0);transition:opacity .25s,transform .25s}
.anim-ico.visivel{opacity:1;transform:scale(1)}
.anim-contador{font-family:'Fredoka One',cursive;font-size:15px;color:#7F77DD}
.anim-contador span{color:#EEEDFE;font-size:22px}

.secao-anim{display:none}
.secao-anim.show{display:block}

.btn-ver{background:#534AB7;color:#EEEDFE;border:none;border-radius:50px;padding:11px 30px;font-family:'Fredoka One',cursive;font-size:17px;cursor:pointer;display:block;margin:0 auto 14px;transition:background .15s,transform .1s}
.btn-ver:hover{background:#3C3489}
.btn-ver:active{transform:scale(.97)}
.btn-ver:disabled{background:#2C2C54;color:#5F5E5A;cursor:not-allowed}

.btn-proximo{background:#EF9F27;color:#412402;border:none;border-radius:50px;padding:12px 30px;font-family:'Fredoka One',cursive;font-size:17px;cursor:pointer;display:none;margin:0 auto;transition:background .15s,transform .1s;text-align:center}
.btn-proximo:hover{background:#BA7517;color:#FAEEDA}
.btn-proximo.show{display:block}

#tela-fim{display:none;background:#26215C;border-radius:20px;padding:30px 20px;text-align:center;max-width:560px;margin:0 auto;border:2px solid #EF9F27}
.fim-titulo{font-family:'Fredoka One',cursive;font-size:30px;color:#EEEDFE;margin-bottom:6px}
.fim-nota{font-family:'Fredoka One',cursive;font-size:88px;line-height:1;margin:10px 0 4px}
.fim-de{font-size:12px;font-weight:700;color:#888;margin-bottom:16px}
.barra-w{background:#1a0533;border-radius:10px;height:20px;overflow:hidden;margin:8px 0}
.barra-f{height:100%;border-radius:10px;transition:width 1.2s ease}
.fim-msg{font-family:'Fredoka One',cursive;font-size:18px;margin:12px 0 20px}
.det-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:20px}
.det{background:#1a0533;border-radius:12px;padding:12px 6px;text-align:center}
.det small{font-size:10px;font-weight:700;color:#7F77DD;display:block;margin-bottom:4px}
.det span{font-family:'Fredoka One',cursive;font-size:24px;color:#EEEDFE;display:block}
.det b{font-size:10px;color:#5F5E5A}
.btn-reiniciar{background:#EF9F27;color:#412402;border:none;border-radius:50px;padding:14px 36px;font-family:'Fredoka One',cursive;font-size:20px;cursor:pointer;transition:background .15s}
.btn-reiniciar:hover{background:#BA7510;color:#FAEEDA}
#tela-jogo{max-width:560px;margin:0 auto}
footer{text-align:center;font-size:10px;color:#534AB7;padding:20px 0 10px;font-weight:700}
</style>

<div class="topo">
  <h1>🎮 JOGO DO REPITA!</h1>
 </div>

<div class="placar-bar">
  <div class="placar-item"><span id="pl-acertos">0</span><small>ACERTOS</small></div>
  <div class="placar-item"><span id="pl-fase">1</span><small>FASE</small></div>
  <div class="placar-item"><span id="pl-total">8</span><small>TOTAL</small></div>
</div>

<div id="tela-jogo">
  <div class="fase-badge"><span id="txt-fase">FASE 1 DE 8</span></div>

  <div class="card-jogo">

    <!-- instrução -->
    <div class="instrucao">
      OLHA O QUE ACONTECEU:
      <span class="destaque" id="instrucao-destaque"></span>
    </div>

    <!-- PERGUNTA + OPÇÕES primeiro -->
    <div class="pergunta">QUANTAS VEZES SE REPETE? CLIQUE NO N&Uacute;MERO CERTO!</div>
    <div class="opcoes-grid" id="opcoes"></div>
    <div class="feedback" id="feedback"></div>

    <!-- ANIMAÇÃO aparece DEPOIS de responder -->
    <div class="secao-anim" id="secao-anim">
      <div class="anim-area">
        <div class="anim-icones" id="anim-icones"></div>
        <div class="anim-contador">REPITA <span id="cont-num">?</span> VEZES: <span id="cont-acao"></span></div>
      </div>
      <button class="btn-ver" id="btn-ver" onclick="animarResposta()">&#9654; VER A ANIMA&Ccedil;&Atilde;O</button>
      <button class="btn-proximo" id="btn-proximo" onclick="avancar()">PR&Oacute;XIMO DESAFIO &#8594;</button>
    </div>

  </div>
</div>

<div id="tela-fim">
  <div class="fim-titulo">🏆 FIM DO JOGO!</div>
  <div class="fim-nota" id="fim-nota">—</div>
  <div class="fim-de">DE 10,0 PONTOS</div>
  <div class="barra-w"><div class="barra-f" id="fim-barra" style="width:0%"></div></div>
  <div class="fim-msg" id="fim-msg"></div>
  <div class="det-grid">
    <div class="det"><small>ACERTOS</small><span id="fim-ac">—</span><b>DE 8</b></div>
    <div class="det"><small>ERROS</small><span id="fim-er">—</span><b>DE 8</b></div>
    <div class="det"><small>NOTA</small><span id="fim-nota2">—</span><b>/ 10</b></div>
  </div>
  <button class="btn-reiniciar" onclick="reiniciar()">🔄 JOGAR DE NOVO!</button>
</div>

<footer>EF02CO02 &middot; 2&ordm; ANO &middot; 1&ordm; TRIMESTRE 2026 &middot; PROFª ADRIANA BETT TEREBINTO</footer>

<script>
var FASES = [
  {ico:'🐸', acao:'PULE',        n:3, errados:[2,4,5]},
  {ico:'⭐', acao:'DESENHE',     n:4, errados:[2,3,6]},
  {ico:'👏', acao:'BATA PALMAS', n:5, errados:[3,4,7]},
  {ico:'🏃', acao:'CORRA',       n:2, errados:[3,4,5]},
  {ico:'🌀', acao:'GIRE',        n:6, errados:[4,5,8]},
  {ico:'💃', acao:'DANCE',       n:3, errados:[2,5,6]},
  {ico:'🎵', acao:'CANTE',       n:4, errados:[2,6,7]},
  {ico:'✨', acao:'BRILHE',      n:7, errados:[5,6,8]},
];

var faseAtual=0, acertos=0, erros=0, animando=false, respondeu=false;

function embaralhar(arr){return arr.slice().sort(function(){return Math.random()-.5;});}

function carregarFase(){
  if(faseAtual>=FASES.length){mostrarFim();return;}
  var f=FASES[faseAtual];
  respondeu=false; animando=false;

  document.getElementById('pl-fase').textContent=faseAtual+1;
  document.getElementById('txt-fase').textContent='FASE '+(faseAtual+1)+' DE '+FASES.length;

  // instrução longa
  var partes=[];
  for(var k=0;k<f.n;k++) partes.push(f.acao);
  document.getElementById('instrucao-destaque').textContent=partes.join(', ');

  // ícones para animação (ocultos)
  var anim=document.getElementById('anim-icones');
  anim.innerHTML='';
  for(var i=0;i<f.n;i++){
    var s=document.createElement('span');
    s.className='anim-ico';
    s.textContent=f.ico;
    s.style.fontSize='34px';
    anim.appendChild(s);
  }
  document.getElementById('cont-num').textContent='?';
  document.getElementById('cont-acao').textContent=f.acao;

  // esconder seção de animação e próximo
  document.getElementById('secao-anim').className='secao-anim';
  document.getElementById('btn-proximo').className='btn-proximo';
  var btnVer=document.getElementById('btn-ver');
  btnVer.disabled=false;
  btnVer.innerHTML='&#9654; VER A ANIMA&Ccedil;&Atilde;O';

  // opções
  var nums=embaralhar([f.n].concat(f.errados));
  var div=document.getElementById('opcoes');
  div.innerHTML='';
  nums.forEach(function(n){
    var b=document.createElement('button');
    b.className='op-n';
    b.textContent=n;
    b.onclick=function(){responder(b,n===f.n);};
    div.appendChild(b);
  });

  document.getElementById('feedback').textContent='';
  document.getElementById('feedback').className='feedback';
}

function responder(btn,certa){
  if(respondeu)return;
  respondeu=true;
  document.querySelectorAll('.op-n').forEach(function(b){b.disabled=true;});
  var fb=document.getElementById('feedback');

  if(certa){
    btn.classList.add('certa');
    acertos++;
    document.getElementById('pl-acertos').textContent=acertos;
    fb.className='feedback ok';
    fb.textContent='🎉 ACERTOU! AGORA VÊ A ANIMAÇÃO!';
  } else {
    btn.classList.add('errada');
    erros++;
    fb.className='feedback nao';
    fb.textContent='❌ ERROU! VÊ A ANIMAÇÃO E CONTA DIREITO!';
    document.querySelectorAll('.op-n').forEach(function(b){
      if(!b.classList.contains('errada'))b.classList.add('certa');
    });
  }

  // mostrar seção de animação
  document.getElementById('secao-anim').className='secao-anim show';
}

function animarResposta(){
  if(animando)return;
  animando=true;
  var btn=document.getElementById('btn-ver');
  btn.disabled=true;
  var icos=document.querySelectorAll('.anim-ico');
  var i=0;
  document.getElementById('cont-num').textContent='?';
  icos.forEach(function(ic){ic.classList.remove('visivel');});

  function passo(){
    if(i<icos.length){
      icos[i].classList.add('visivel');
      i++;
      document.getElementById('cont-num').textContent=i;
      setTimeout(passo,400);
    } else {
      animando=false;
      btn.innerHTML='&#9654; VER DE NOVO';
      btn.disabled=false;
      // mostrar botão próximo depois de animar
      document.getElementById('btn-proximo').className='btn-proximo show';
    }
  }
  setTimeout(passo,200);
}

function avancar(){
  faseAtual++;
  carregarFase();
  window.scrollTo({top:0,behavior:'smooth'});
}

function mostrarFim(){
  document.getElementById('tela-jogo').style.display='none';
  document.getElementById('tela-fim').style.display='block';
  var nota=parseFloat((acertos/FASES.length*10).toFixed(1));
  var cor,msg;
  if(nota>=9){cor='#5DCAA5';msg='EXCELENTE! VOCÊ É CRAQUE NO REPITA!';}
  else if(nota>=7){cor='#FAC775';msg='MUITO BOM! CONTINUE PRATICANDO!';}
  else if(nota>=5){cor='#EF9F27';msg='BOM ESFORÇO! TENTE DE NOVO!';}
  else{cor='#F09595';msg='NÃO DESANIME! JOGAR DE NOVO AJUDA!';}
  var notaStr=nota.toFixed(1).replace('.',',');
  document.getElementById('fim-nota').textContent=notaStr;
  document.getElementById('fim-nota').style.color=cor;
  document.getElementById('fim-barra').style.width=(nota*10)+'%';
  document.getElementById('fim-barra').style.background=cor;
  document.getElementById('fim-msg').textContent=msg;
  document.getElementById('fim-msg').style.color=cor;
  document.getElementById('fim-ac').textContent=acertos;
  document.getElementById('fim-er').textContent=erros;
  document.getElementById('fim-nota2').textContent=notaStr;
  document.getElementById('fim-nota2').style.color=cor;
}

function reiniciar(){
  faseAtual=0;acertos=0;erros=0;animando=false;respondeu=false;
  document.getElementById('pl-acertos').textContent='0';
  document.getElementById('pl-fase').textContent='1';
  document.getElementById('tela-fim').style.display='none';
  document.getElementById('tela-jogo').style.display='block';
  carregarFase();
}

carregarFase();
</script>
