
<style>
@import url('https://fonts.googleapis.com/css2?family=Fredoka+One&display=swap');
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Fredoka One',cursive;background:#1a0533;min-height:100vh;padding:12px;}

#app{max-width:480px;margin:0 auto;display:flex;flex-direction:column;gap:12px;align-items:center;}

#placar-row{display:flex;gap:10px;justify-content:center;width:100%;}
.placar-box{background:#26215C;border-radius:14px;padding:8px 18px;text-align:center;flex:1;max-width:120px;}
.placar-box span{font-size:26px;color:#EEEDFE;display:block;line-height:1;}
.placar-box small{font-size:11px;color:#7F77DD;}

#fase-badge{background:#534AB7;color:#EEEDFE;font-size:13px;padding:5px 20px;border-radius:20px;letter-spacing:1px;}

#card{background:#fff;border-radius:24px;width:100%;padding:20px 16px;display:flex;flex-direction:column;align-items:center;gap:14px;border:3px solid #534AB7;}

#passo-label{font-size:13px;color:#534AB7;background:#EEEDFE;border-radius:20px;padding:4px 16px;}

#box-icones{
  background:#1a0533;border-radius:18px;width:100%;padding:16px 10px;
  display:flex;flex-wrap:wrap;justify-content:center;gap:8px;min-height:90px;
  align-items:center;border:2px solid #3C3489;
}
.ico-grande{font-size:42px;transition:transform 0.15s;}
.ico-grande.pulsa{transform:scale(1.35);}

#pergunta-txt{font-size:17px;color:#1a0533;text-align:center;line-height:1.3;}

#opcoes{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;width:100%;}
.op{
  font-family:'Fredoka One',cursive;font-size:32px;color:#EEEDFE;
  background:#3C3489;border:2.5px solid #534AB7;border-radius:14px;
  padding:14px 4px;cursor:pointer;text-align:center;
  transition:transform 0.12s,background 0.12s;
}
.op:hover{transform:scale(1.1);background:#534AB7;}
.op.certa{background:#0F6E56;border-color:#5DCAA5;}
.op.errada{background:#A32D2D;border-color:#F09595;animation:shk .3s;}
@keyframes shk{0%,100%{transform:translateX(0)}30%{transform:translateX(-8px)}70%{transform:translateX(8px)}}

#feedback{font-size:20px;text-align:center;min-height:28px;}
.ok{color:#0F6E56;}
.nao{color:#A32D2D;}

#btn-animar{
  font-family:'Fredoka One',cursive;font-size:18px;
  background:#EF9F27;color:#412402;border:none;border-radius:50px;
  padding:12px 28px;cursor:pointer;display:none;
  transition:background 0.15s,transform 0.1s;
}
#btn-animar:hover{background:#BA7517;}
#btn-animar:active{transform:scale(0.97);}
#btn-animar.show{display:block;}

#btn-proximo{
  font-family:'Fredoka One',cursive;font-size:18px;
  background:#534AB7;color:#EEEDFE;border:none;border-radius:50px;
  padding:12px 28px;cursor:pointer;display:none;
  transition:background 0.15s,transform 0.1s;
}
#btn-proximo:hover{background:#3C3489;}
#btn-proximo:active{transform:scale(0.97);}
#btn-proximo.show{display:block;}

#tela-fim{
  display:none;background:#26215C;border-radius:24px;
  width:100%;padding:28px 20px;text-align:center;
  border:3px solid #EF9F27;flex-direction:column;align-items:center;gap:12px;
}
#tela-fim.show{display:flex;}
.fim-titulo{font-size:28px;color:#EEEDFE;}
.fim-nota{font-size:80px;line-height:1;}
.fim-msg{font-size:18px;}
.det-row{display:flex;gap:10px;justify-content:center;}
.det-box{background:#1a0533;border-radius:14px;padding:10px 18px;text-align:center;}
.det-box small{font-size:11px;color:#7F77DD;display:block;}
.det-box span{font-size:26px;color:#EEEDFE;}
#btn-reiniciar{
  font-family:'Fredoka One',cursive;font-size:20px;
  background:#EF9F27;color:#412402;border:none;border-radius:50px;
  padding:14px 32px;cursor:pointer;margin-top:6px;
}
#btn-reiniciar:hover{background:#BA7517;}

footer{font-family:Arial,sans-serif;text-align:center;font-size:10px;color:#534AB7;padding:12px 0 4px;font-weight:700;letter-spacing:0.5px;}
</style>

<div id="app">
  <div id="placar-row">
    <div class="placar-box"><span id="pl-ac">0</span><small>ACERTOS</small></div>
    <div class="placar-box"><span id="pl-fase">1</span><small>FASE</small></div>
    <div class="placar-box"><span id="pl-total">8</span><small>TOTAL</small></div>
  </div>

  <div id="fase-badge">FASE 1 DE 8</div>

  <div id="card">
    <div id="passo-label">👀 QUANTAS VEZES APARECE?</div>

    <div id="box-icones"></div>

    <div id="pergunta-txt">CLIQUE NO NÚMERO CERTO!</div>

    <div id="opcoes"></div>

    <div id="feedback"></div>

    <button id="btn-animar" onclick="animar()">▶ VER DE NOVO</button>
    <button id="btn-proximo" onclick="avancar()">PRÓXIMO ➜</button>
  </div>

  <div id="tela-fim">
    <div class="fim-titulo">🏆 FIM DO JOGO!</div>
    <div class="fim-nota" id="fim-nota"></div>
    <div class="fim-msg" id="fim-msg"></div>
    <div class="det-row">
      <div class="det-box"><small>ACERTOS</small><span id="fim-ac"></span></div>
      <div class="det-box"><small>ERROS</small><span id="fim-er"></span></div>
      <div class="det-box"><small>NOTA</small><span id="fim-n2"></span></div>
    </div>
    <button id="btn-reiniciar" onclick="reiniciar()">🔄 JOGAR DE NOVO!</button>
  </div>

  <footer>EF02CO02 · 2º ANO · 1º TRIMESTRE 2026 · PROFª ADRIANA BETT TEREBINTO</footer>
</div>

<script>
var FASES=[
  {ico:'🐸',n:3,errados:[2,4,5]},
  {ico:'⭐',n:4,errados:[2,3,6]},
  {ico:'👏',n:5,errados:[3,4,7]},
  {ico:'🏃',n:2,errados:[3,4,5]},
  {ico:'🌀',n:6,errados:[4,5,8]},
  {ico:'💃',n:3,errados:[2,5,6]},
  {ico:'🎵',n:4,errados:[2,6,7]},
  {ico:'✨',n:7,errados:[5,6,8]},
];

var fase=0,acertos=0,erros=0,respondeu=false;

function embaralhar(a){return a.slice().sort(function(){return Math.random()-.5;});}

function carregar(){
  if(fase>=FASES.length){mostrarFim();return;}
  var f=FASES[fase];
  respondeu=false;

  document.getElementById('pl-fase').textContent=fase+1;
  document.getElementById('fase-badge').textContent='FASE '+(fase+1)+' DE '+FASES.length;
  document.getElementById('feedback').textContent='';
  document.getElementById('feedback').className='';
  document.getElementById('btn-animar').className='';
  document.getElementById('btn-proximo').className='';

  var box=document.getElementById('box-icones');
  box.innerHTML='';
  for(var i=0;i<f.n;i++){
    var s=document.createElement('span');
    s.className='ico-grande';
    s.textContent=f.ico;
    box.appendChild(s);
  }

  var nums=embaralhar([f.n].concat(f.errados));
  var op=document.getElementById('opcoes');
  op.innerHTML='';
  nums.forEach(function(n){
    var b=document.createElement('button');
    b.className='op';
    b.textContent=n;
    (function(btn,val){
      btn.onclick=function(){responder(btn,val===f.n);};
    })(b,n);
    op.appendChild(b);
  });
}

function responder(btn,certa){
  if(respondeu)return;
  respondeu=true;
  document.querySelectorAll('.op').forEach(function(b){b.disabled=true;});
  var fb=document.getElementById('feedback');
  if(certa){
    btn.classList.add('certa');
    acertos++;
    document.getElementById('pl-ac').textContent=acertos;
    fb.className='ok';
    fb.textContent='🎉 MUITO BEM!';
  } else {
    btn.classList.add('errada');
    erros++;
    fb.className='nao';
    fb.textContent='❌ OPS! VEJA A RESPOSTA CERTA!';
    document.querySelectorAll('.op').forEach(function(b){
      if(parseInt(b.textContent)===FASES[fase].n) b.classList.add('certa');
    });
  }
  document.getElementById('btn-animar').className='show';
  animar();
}

function animar(){
  var icos=document.querySelectorAll('.ico-grande');
  var i=0;
  icos.forEach(function(ic){ic.classList.remove('pulsa');});
  function passo(){
    if(i<icos.length){
      if(i>0) icos[i-1].classList.remove('pulsa');
      icos[i].classList.add('pulsa');
      i++;
      setTimeout(passo,450);
    } else {
      setTimeout(function(){
        icos[icos.length-1].classList.remove('pulsa');
        document.getElementById('btn-proximo').className='show';
      },300);
    }
  }
  setTimeout(passo,100);
}

function avancar(){
  fase++;
  carregar();
  window.scrollTo({top:0,behavior:'smooth'});
}

function mostrarFim(){
  document.getElementById('card').style.display='none';
  document.getElementById('fase-badge').style.display='none';
  var fim=document.getElementById('tela-fim');
  fim.className='show';
  var nota=parseFloat((acertos/FASES.length*10).toFixed(1));
  var cor,msg;
  if(nota>=9){cor='#5DCAA5';msg='INCRÍVEL! VOCÊ É CRAQUE! 🏆';}
  else if(nota>=7){cor='#FAC775';msg='MUITO BOM! CONTINUE ASSIM! ⭐';}
  else if(nota>=5){cor='#EF9F27';msg='BOM ESFORÇO! TENTE DE NOVO! 💪';}
  else{cor='#F09595';msg='NÃO DESANIME! JOGAR DE NOVO AJUDA! 🎮';}
  var ns=nota.toFixed(1).replace('.',',');
  var n=document.getElementById('fim-nota');
  n.textContent=ns;n.style.color=cor;
  var m=document.getElementById('fim-msg');
  m.textContent=msg;m.style.color=cor;
  document.getElementById('fim-ac').textContent=acertos;
  document.getElementById('fim-er').textContent=erros;
  var n2=document.getElementById('fim-n2');
  n2.textContent=ns;n2.style.color=cor;
}

function reiniciar(){
  fase=0;acertos=0;erros=0;respondeu=false;
  document.getElementById('pl-ac').textContent='0';
  document.getElementById('pl-fase').textContent='1';
  document.getElementById('card').style.display='flex';
  document.getElementById('fase-badge').style.display='block';
  document.getElementById('tela-fim').className='';
  carregar();
}

carregar();
</script>
